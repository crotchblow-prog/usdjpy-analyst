name: USD/JPY Reports

on:
  schedule:
    # 08:30 JST = 23:30 UTC previous day (Mon-Fri → Sun-Thu UTC)
    - cron: '30 23 * * 0-4'
    # 14:30 JST = 05:30 UTC — Monitor live check (6h after morning SMC)
    - cron: '30 5 * * 1-5'
    # 16:30 JST = 07:30 UTC same day (Mon-Fri)
    - cron: '30 7 * * 1-5'
    # 20:30 JST = 11:30 UTC — Scorecard (12h after morning SMC)
    - cron: '30 11 * * 1-5'
    # 22:30 JST = 13:30 UTC — Monitor live check (6h after afternoon SMC)
    - cron: '30 13 * * 1-5'
    # 04:30 JST next day = 19:30 UTC — Scorecard (12h after afternoon SMC)
    - cron: '30 19 * * 1-5'
    # 09:00 JST = 00:00 UTC — Validation (30min after morning report)
    - cron: '0 0 * * 1-5'
    # 17:00 JST = 08:00 UTC — Validation (30min after afternoon SMC)
    - cron: '0 8 * * 1-5'
  workflow_dispatch:
    inputs:
      report_type:
        description: 'Which reports to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - daily
          - weekly
          - smc
          - monitor
          - scorecard
          - validation

env:
  TZ: Asia/Tokyo

jobs:
  generate-reports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create config from secrets
        run: |
          cp config.yaml.example config.yaml
          sed -i "s/YOUR_FRED_API_KEY_HERE/${{ secrets.FRED_API_KEY }}/" config.yaml
          sed -i "s/your_email@gmail.com/${{ secrets.GMAIL_ADDRESS }}/g" config.yaml
          # Set Supabase URL in config
          if [ -n "${{ secrets.SUPABASE_URL }}" ]; then
            sed -i 's|url: ""|url: "${{ secrets.SUPABASE_URL }}"|' config.yaml
          fi

      - name: Create data directories
        run: mkdir -p data/raw output/daily output/weekly output/scorecard logs

      - name: Determine run type
        id: run-type
        run: |
          JST_DATE=$(date +%Y-%m-%d)
          JST_DOW=$(date +%u)  # 1=Mon ... 7=Sun
          echo "date=$JST_DATE" >> $GITHUB_OUTPUT

          # Defaults
          echo "daily=false" >> $GITHUB_OUTPUT
          echo "weekly=false" >> $GITHUB_OUTPUT
          echo "smc=false" >> $GITHUB_OUTPUT
          echo "monitor=false" >> $GITHUB_OUTPUT
          echo "scorecard=false" >> $GITHUB_OUTPUT
          echo "validation=false" >> $GITHUB_OUTPUT

          # Manual trigger
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TYPE="${{ github.event.inputs.report_type }}"
            echo "type=$TYPE" >> $GITHUB_OUTPUT
            if [ "$TYPE" = "all" ] || [ "$TYPE" = "weekly" ]; then
              echo "weekly=true" >> $GITHUB_OUTPUT
            fi
            if [ "$TYPE" = "all" ] || [ "$TYPE" = "daily" ]; then
              echo "daily=true" >> $GITHUB_OUTPUT
            fi
            if [ "$TYPE" = "all" ] || [ "$TYPE" = "smc" ] || [ "$TYPE" = "daily" ]; then
              echo "smc=true" >> $GITHUB_OUTPUT
            fi
            if [ "$TYPE" = "all" ] || [ "$TYPE" = "monitor" ]; then
              echo "monitor=true" >> $GITHUB_OUTPUT
            fi
            if [ "$TYPE" = "all" ] || [ "$TYPE" = "scorecard" ]; then
              echo "scorecard=true" >> $GITHUB_OUTPUT
            fi
            if [ "$TYPE" = "all" ] || [ "$TYPE" = "validation" ]; then
              echo "validation=true" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          # Scheduled trigger — match on the cron expression that fired
          # (immune to GitHub Actions delay which can shift the actual hour)
          CRON="${{ github.event.schedule }}"
          case "$CRON" in
            "30 23 * * 0-4")
              # 23:30 UTC = 08:30 JST morning run
              echo "type=morning" >> $GITHUB_OUTPUT
              echo "daily=true" >> $GITHUB_OUTPUT
              echo "smc=true" >> $GITHUB_OUTPUT
              if [ "$JST_DOW" -eq 1 ]; then
                echo "weekly=true" >> $GITHUB_OUTPUT
              fi
              ;;
            "30 5 * * 1-5")
              # 05:30 UTC = 14:30 JST — Monitor (6h after morning SMC)
              echo "type=monitor-am" >> $GITHUB_OUTPUT
              echo "monitor=true" >> $GITHUB_OUTPUT
              ;;
            "30 7 * * 1-5")
              # 07:30 UTC = 16:30 JST afternoon run (SMC only)
              echo "type=afternoon" >> $GITHUB_OUTPUT
              echo "smc=true" >> $GITHUB_OUTPUT
              ;;
            "30 11 * * 1-5")
              # 11:30 UTC = 20:30 JST — Scorecard (12h after morning SMC)
              echo "type=scorecard-am" >> $GITHUB_OUTPUT
              echo "scorecard=true" >> $GITHUB_OUTPUT
              ;;
            "30 13 * * 1-5")
              # 13:30 UTC = 22:30 JST — Monitor (6h after afternoon SMC)
              echo "type=monitor-pm" >> $GITHUB_OUTPUT
              echo "monitor=true" >> $GITHUB_OUTPUT
              ;;
            "30 19 * * 1-5")
              # 19:30 UTC = 04:30 JST — Scorecard (12h after afternoon SMC)
              echo "type=scorecard-pm" >> $GITHUB_OUTPUT
              echo "scorecard=true" >> $GITHUB_OUTPUT
              ;;
            "0 0 * * 1-5")
              # 00:00 UTC = 09:00 JST — Validation (morning)
              echo "type=validation-am" >> $GITHUB_OUTPUT
              echo "validation=true" >> $GITHUB_OUTPUT
              ;;
            "0 8 * * 1-5")
              # 08:00 UTC = 17:00 JST — Validation (afternoon)
              echo "type=validation-pm" >> $GITHUB_OUTPUT
              echo "validation=true" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Run Daily Report
        if: steps.run-type.outputs.daily == 'true'
        id: daily
        continue-on-error: true
        run: |
          python run_daily_analysis.py
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Generate Daily PDF
        if: steps.run-type.outputs.daily == 'true' && steps.daily.outcome == 'success'
        continue-on-error: true
        run: |
          REPORT="output/daily/${{ steps.run-type.outputs.date }}.md"
          if [ -f "$REPORT" ]; then
            python scripts/generate_pdf.py "$REPORT"
          fi

      - name: Push Daily to Supabase
        if: steps.run-type.outputs.daily == 'true' && steps.daily.outcome == 'success'
        continue-on-error: true
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          REPORT="output/daily/${{ steps.run-type.outputs.date }}.md"
          if [ -f "$REPORT" ]; then
            python scripts/push_to_supabase.py "$REPORT"
          fi

      - name: Run Weekly Report
        if: steps.run-type.outputs.weekly == 'true'
        id: weekly
        continue-on-error: true
        run: |
          python run_daily_analysis.py --weekly
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Generate Weekly PDF
        if: steps.run-type.outputs.weekly == 'true' && steps.weekly.outcome == 'success'
        continue-on-error: true
        run: |
          REPORT="output/weekly/${{ steps.run-type.outputs.date }}.md"
          if [ -f "$REPORT" ]; then
            python scripts/generate_pdf.py "$REPORT"
          fi

      - name: Push Weekly to Supabase
        if: steps.run-type.outputs.weekly == 'true' && steps.weekly.outcome == 'success'
        continue-on-error: true
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          REPORT="output/weekly/${{ steps.run-type.outputs.date }}.md"
          if [ -f "$REPORT" ]; then
            python scripts/push_to_supabase.py "$REPORT"
          fi

      - name: Run SMC Report
        if: steps.run-type.outputs.smc == 'true'
        id: smc
        continue-on-error: true
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/run_smc_analysis.py --mode full
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Run Monitor
        if: steps.run-type.outputs.monitor == 'true'
        id: monitor
        continue-on-error: true
        run: |
          python scripts/run_scenario_monitor.py --mode check
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Run Scorecard
        if: steps.run-type.outputs.scorecard == 'true'
        id: scorecard
        continue-on-error: true
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/run_scenario_monitor.py --mode scorecard
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Run Validation
        if: steps.run-type.outputs.validation == 'true'
        id: validation
        continue-on-error: true
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/run_validation.py
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Commit scorecard data
        if: steps.run-type.outputs.scorecard == 'true' && steps.scorecard.outcome == 'success'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f output/scorecard/scenario_log.csv ]; then
            git add output/scorecard/scenario_log.csv
            git diff --cached --quiet || git commit -m "Update scenario scorecard [automated]"
            git push
          fi

      - name: Summary
        if: always()
        run: |
          echo "## USD/JPY Report Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Report | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Date (JST) | ${{ steps.run-type.outputs.date }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run type | ${{ steps.run-type.outputs.type }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.run-type.outputs.daily }}" = "true" ]; then
            echo "| Daily | ${{ steps.daily.outcome }} |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.run-type.outputs.weekly }}" = "true" ]; then
            echo "| Weekly | ${{ steps.weekly.outcome }} |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.run-type.outputs.smc }}" = "true" ]; then
            echo "| SMC | ${{ steps.smc.outcome }} |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.run-type.outputs.monitor }}" = "true" ]; then
            echo "| Monitor | ${{ steps.monitor.outcome }} |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.run-type.outputs.scorecard }}" = "true" ]; then
            echo "| Scorecard | ${{ steps.scorecard.outcome }} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| Validation | ${{ steps.validation.outcome || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Generated files:" >> $GITHUB_STEP_SUMMARY
          find output -name "*.md" -o -name "*.pdf" -o -name "*.png" -o -name "*.csv" 2>/dev/null | sort >> $GITHUB_STEP_SUMMARY

      - name: Archive reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reports-${{ steps.run-type.outputs.date }}-${{ github.run_id }}
          path: output/
          retention-days: 30
          if-no-files-found: ignore
